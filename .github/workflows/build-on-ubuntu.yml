name: Ubuntu CI

on: push

jobs:
  build:
    name: Build on Ubuntu
    runs-on: ubuntu-22.04
    timeout-minutes: 120   # Avoid premature job termination on slow runners.
    concurrency:  # Avoid canceling in-progress runs for the same workflow/ref.
      group: ubuntu-ci-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: zulu
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      # `build` does not run Dokka — its tasks are gated to the publishing
      # graph — so `dokkaGenerate` is appended to surface documentation
      # warnings on each push, before a merge, instead of only in the post-merge
      # `Publish` job. `failOnWarning` is enabled in the Dokka setup.
      - name: Build project, run tests, and check documentation
        shell: bash
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx3g -XX:+HeapDumpOnOutOfMemoryError"
        run: |
          echo "Start (UTC): $(date -u)"
          ./gradlew build dokkaGenerate --stacktrace --info --scan
          echo "End (UTC): $(date -u)"

      # See: https://github.com/marketplace/actions/junit-report-action
      - name: Publish test report
        uses: mikepenz/action-junit-report@v4.0.3
        if: always() # Always run even if the previous step fails.
        with:
          report_paths: '**/build/test-results/**/TEST-*.xml'
          require_tests: true # Fails workflow if test reports are not found.

      - name: Upload code coverage report
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

      - name: Upload Gradle build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
            **/build/scan-data/**
