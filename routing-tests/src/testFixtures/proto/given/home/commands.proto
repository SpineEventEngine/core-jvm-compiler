syntax = "proto3";

package given.home;

import "spine/options.proto";

option (type_url_prefix) = "type.spine.io";
option java_package = "io.spine.given.home.commands";
option java_outer_classname = "CommandsProto";
option java_multiple_files = true;

import "given/home/values.proto";

message AddDevice {
    DeviceId device = 1;
    string name = 2 [(required) = true];
}

message AddRoom {
    RoomId room = 1;
    string name = 2 [(required) = true];
}

message MoveDevice {
    DeviceId device = 1 [(required) = true];
    RoomId from = 2;
    RoomId to = 3 [(required) = true];
}

// A command which participates in demonstrating the routing function
// which relies on a field other than the first one.
//
// Normally the first field of a command is the ID of the target entity.
// Here we simulate the case when the "real" ID field is not the first one,
// but the one which is used by the routing function.
// See `HomeAutomationContext.kt` file and the companion object of
// `DeviceAggregate` class for the routing function that relies on the `device` field.
//
message SetState {
    // The legacy ID for a target. Still have to support.
    RoomId room = 1 [deprecated = true];

    // Previously, we referenced a device via its room and a name.
    //
    // Now we have a dedicated field for the device ID, but we keep the old one
    // for compatibility reasons.
    //
    string device_name = 2 [deprecated = true];

    State state = 3 [(required) = true];

    // The new way of routing.
    DeviceId device = 4 [(required) = true];
}
